name: gitpull_safe
description: Safely update local main and optionally create a new branch
parent: default

matches:
  - trigger: ":gitpull"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "bash ~/.config/espanso/packages/gitpull_safe/gitpull_safe.sh 2>&1"

  - trigger: ":gitpullb"
    replace: "{{output}}"
    vars:
      - name: branch
        type: form
        params:
          layout: |
            New branch name (optional): [[branch]]
          fields:
            branch:
              multiline: false
      - name: output
        type: shell
        params:
          cmd: "bash ~/.config/espanso/packages/gitpull_safe/gitpull_safe.sh '{{branch}}' 2>&1"
